name = "leludo-mp"
main = "src/server/cf/worker.js"
compatibility_date = "2025-06-01"

# Operator-tunable capacity caps (see docs/multiplayer-plan.md → Budget). Account
# is on the Workers Paid ($5/mo) plan. The relevant Durable-Object INCLUDED
# allowances (account-wide, shared across prod + beta, billed beyond): rows
# written 50,000,000/month (~1.67M/day), duration 400,000 GB-s/month. Real-play
# cost (live prod data) runs ~570 rows per 2-player game, ~1,668 per 4-player
# game — dominated by the per-broadcast resume snapshot the room DO writes so a
# game survives a code deploy (v0.28.5; see server/cf/room-do.js "Deploy
# survival"), plus reconnects + grace alarms. Caps sized so a worst-case all-4p
# day across prod + beta stays within the INCLUDED allowance (no overage):
#   prod 900/day + beta 100/day = 1000 × ~1,668 ≈ 1.67M rows/day ≈ 50M/month.
# NOTE: bot / 4-player games do NOT hibernate (the DO is pinned by setTimeout
# bot-pacing + grace) and burn ~13+ GB-s each vs ~0.4 for an idle 2p game →
# ~1000 4p-games/day × 13 GB-s × 30 ≈ 390k GB-s/month, also right at the 400k
# INCLUDED. Caps stay the real footgun guard even on paid; pair them with a
# Cloudflare BILLING ALERT as the backstop (see multiplayer-plan.md). Hitting a
# cap returns a friendly BUSY. Override per-env via `wrangler secret`/vars or the
# dashboard; no code redeploy needed.
[vars]
MAX_CONCURRENT_GAMES = "40"
MAX_GAMES_PER_DAY = "900"
RECONNECT_GRACE_MS = "60000"
MATCH_FILL_MS = "20000"

# One Durable Object class per role (docs/multiplayer-plan.md → Components):
#   ROOM      one instance per game (authoritative state)
#   ADMISSION singleton hard-capacity gate
#   MATCH     singleton public matchmaking queue (off the launch path — see
#             server/cf/match-do.js header)
[[durable_objects.bindings]]
name = "ROOM"
class_name = "LudoRoomDO"

[[durable_objects.bindings]]
name = "ADMISSION"
class_name = "AdmissionDO"

[[durable_objects.bindings]]
name = "MATCH"
class_name = "MatchmakingDO"

# SQLite-backed Durable Objects. `new_sqlite_classes` MUST list every DO class on
# first deploy.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LudoRoomDO", "AdmissionDO", "MatchmakingDO"]

# Custom domain — gives the client a stable wss:// endpoint that matches the
# PROD_SERVER_URL default in scripts/net-client.js. Requires leludo.org's DNS to
# be on Cloudflare; uncomment after the zone is added, then `wrangler deploy`
# creates the `mp` record automatically.
[[routes]]
pattern = "mp.leludo.org"
custom_domain = true

# ─────────────────────────────────────────────────────────────────────────────
# Beta environment — a SEPARATE Worker (`leludo-mp-beta`, the `name` suffix is
# automatic) with its OWN Durable Object namespaces, so beta rooms + admission
# counters are fully isolated from production. Deploy with:
#     npm run cf:deploy:beta      (= wrangler deploy --env beta)
# The beta SITE (beta.leludo.org) dials this via BETA_SERVER_URL in
# scripts/net/net-client.js. prod + beta share ONE account-wide DO allowance
# (50M SQL rows written/month on the Workers Paid plan); beta takes a fixed slice
# (100 games/day ≈ 167k rows worst-case 4p) so it can never starve prod's share.
#
# wrangler gotcha: `vars` and `durable_objects` are NON-inheritable — they must
# be repeated here. `[[migrations]]` IS shared from the top level, so the beta
# Worker's DOs get the same v1 SQLite classes (do NOT redeclare it).
[env.beta.vars]
MAX_CONCURRENT_GAMES = "40"
MAX_GAMES_PER_DAY = "100"
RECONNECT_GRACE_MS = "60000"
MATCH_FILL_MS = "20000"

[[env.beta.durable_objects.bindings]]
name = "ROOM"
class_name = "LudoRoomDO"

[[env.beta.durable_objects.bindings]]
name = "ADMISSION"
class_name = "AdmissionDO"

[[env.beta.durable_objects.bindings]]
name = "MATCH"
class_name = "MatchmakingDO"

[[env.beta.routes]]
pattern = "mp-beta.leludo.org"
custom_domain = true
