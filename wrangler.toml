name = "leludo-mp"
main = "src/server/cf/worker.js"
compatibility_date = "2025-06-01"

# Operator-tunable capacity caps (see docs/multiplayer-plan.md → Budget). The
# free-tier BINDING limit is SQL rows written: 100,000/day, shared ACCOUNT-WIDE
# across prod + beta (one free bucket, NOT per-Worker). Measured cost ≈ 365 rows
# per 2-player game, ~1,015 per 4-player game (×2.78, game-driver sim). Caps sized
# so a worst-case all-4p day across prod + beta stays under 100k with margin:
#   prod 70/day + beta 8/day = 78 × ~1,015 ≈ 79k rows < 100k.
# Hitting a cap returns a friendly BUSY (never a bill). Raise these only on the
# $5 Workers Paid plan. Override per-env via `wrangler secret`/vars or the
# dashboard; no code redeploy needed.
[vars]
MAX_CONCURRENT_GAMES = "25"
MAX_GAMES_PER_DAY = "70"
RECONNECT_GRACE_MS = "60000"
MATCH_FILL_MS = "20000"

# One Durable Object class per role (docs/multiplayer-plan.md → Components):
#   ROOM      one instance per game (authoritative state)
#   ADMISSION singleton hard-capacity gate
#   MATCH     singleton public matchmaking queue (off the launch path — see
#             server/cf/match-do.js header)
[[durable_objects.bindings]]
name = "ROOM"
class_name = "LudoRoomDO"

[[durable_objects.bindings]]
name = "ADMISSION"
class_name = "AdmissionDO"

[[durable_objects.bindings]]
name = "MATCH"
class_name = "MatchmakingDO"

# Free plan → SQLite-backed Durable Objects (the only DO storage tier on the
# free plan). `new_sqlite_classes` MUST list every DO class on first deploy.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LudoRoomDO", "AdmissionDO", "MatchmakingDO"]

# Custom domain — gives the client a stable wss:// endpoint that matches the
# PROD_SERVER_URL default in scripts/net-client.js. Requires leludo.org's DNS to
# be on Cloudflare; uncomment after the zone is added, then `wrangler deploy`
# creates the `mp` record automatically.
[[routes]]
pattern = "mp.leludo.org"
custom_domain = true

# ─────────────────────────────────────────────────────────────────────────────
# Beta environment — a SEPARATE Worker (`leludo-mp-beta`, the `name` suffix is
# automatic) with its OWN Durable Object namespaces, so beta rooms + admission
# counters are fully isolated from production. Deploy with:
#     npm run cf:deploy:beta      (= wrangler deploy --env beta)
# The beta SITE (beta.leludo.org) dials this via BETA_SERVER_URL in
# scripts/net/net-client.js. Still $0: prod + beta share ONE account-wide free
# bucket (100k SQL rows written/day); beta takes a small fixed slice (8 games/day
# ≈ 8k rows worst-case 4p) so it can never starve prod's share.
#
# wrangler gotcha: `vars` and `durable_objects` are NON-inheritable — they must
# be repeated here. `[[migrations]]` IS shared from the top level, so the beta
# Worker's DOs get the same v1 SQLite classes (do NOT redeclare it).
[env.beta.vars]
MAX_CONCURRENT_GAMES = "6"
MAX_GAMES_PER_DAY = "8"
RECONNECT_GRACE_MS = "60000"
MATCH_FILL_MS = "20000"

[[env.beta.durable_objects.bindings]]
name = "ROOM"
class_name = "LudoRoomDO"

[[env.beta.durable_objects.bindings]]
name = "ADMISSION"
class_name = "AdmissionDO"

[[env.beta.durable_objects.bindings]]
name = "MATCH"
class_name = "MatchmakingDO"

[[env.beta.routes]]
pattern = "mp-beta.leludo.org"
custom_domain = true
