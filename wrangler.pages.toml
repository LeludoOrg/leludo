# Cloudflare Pages config for the STATIC site (leludo.org / beta.leludo.org).
#
# Kept separate from the Worker config (wrangler.toml = the `leludo-mp`
# multiplayer Worker + Durable Objects) so `wrangler pages deploy --config
# wrangler.pages.toml` reads THIS file, not the Worker's. Without a Pages config
# carrying `pages_build_output_dir`, wrangler auto-discovers wrangler.toml,
# warns that the field is missing, and ignores it — harmless but noisy and a
# footgun. This file silences that and pins the upload dir.
#
# `name` is the prod Pages project; the beta deploy overrides it with
# --project-name=leludo-beta. The www/ dir is produced by tools/build-www.mjs
# immediately before each deploy.
name = "leludo"
pages_build_output_dir = "www"
compatibility_date = "2025-06-01"
