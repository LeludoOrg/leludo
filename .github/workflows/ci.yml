name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    # Run inside the official Playwright image so Chromium and every
    # required OS shared lib are baked into the container. Skips the
    # 1-2 min `npx playwright install --with-deps` step that
    # ubuntu-latest needs on every run.
    #
    # Tag MUST match the @playwright/test version pinned in
    # package-lock.json (currently 1.61.1). When you bump
    # @playwright/test in package.json, also bump this tag — the test
    # runner refuses to launch against a mismatched browser bundle.
    # The bundled image ships Node 20; we don't run actions/setup-node
    # here since e2e doesn't care about the host Node version.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-web:
    name: Web build smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read VERSION
        run: node -e "import('./src/version.js').then(m => console.log('VERSION =', m.VERSION))"

      - name: Build www/
        run: npm run build:www

      - name: Confirm www/ contents
        run: |
          test -f www/index.html
          test -f www/changelog.html
          test -f www/privacy.html
          test -f www/version.js
          test -f www/manifest.json
          test -f www/styles/base.css
          test -d www/assets
          # Service worker removed (v0.28.4): no sw.js, and the raw source
          # module trees are no longer shipped — prod runs only the bundles.
          ! test -e www/sw.js
          ! test -d www/components
          ! test -d www/scripts
          # Content-hashed production bundles (build-www.mjs): app + analytics
          # JS, split game CSS. Guards the first-load optimization + the hashing.
          ls www/app.*.js >/dev/null
          ls www/analytics.*.js >/dev/null
          ls www/game.*.css >/dev/null
          # index.html must reference the hashed bundle, inline critical CSS, and
          # load game.css non-blocking — not the raw per-module shell.
          grep -qE '<script type="module" src="app\.[0-9a-f]+\.js">' www/index.html
          grep -qE 'href="game\.[0-9a-f]+\.css" media="print"' www/index.html
          grep -q '<style>' www/index.html
          ! grep -q 'src="components/index.js"' www/index.html
          ! grep -q 'href="components/wc-board.css"' www/index.html
          # changelog/privacy load the hashed analytics bundle, not raw source.
          grep -qE "from '\./analytics\.[0-9a-f]+\.js'" www/changelog.html
          ! grep -q "scripts/platform/analytics.js" www/privacy.html
