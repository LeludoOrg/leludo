name: Release (Web)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read VERSION from version.js
        id: read
        run: |
          VERSION=$(node -e "import('./src/version.js').then(m => process.stdout.write(m.VERSION))")
          if [ -z "$VERSION" ]; then
            echo "Failed to read VERSION from version.js" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected VERSION=$VERSION"

  test:
    name: Unit + integration tests
    needs: detect-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  deploy-worker:
    name: Deploy multiplayer Worker
    needs: [detect-version, test]
    runs-on: ubuntu-latest
    # Deploys server/cf/* (the Cloudflare multiplayer backend) from wrangler.toml.
    # Runs only after tests pass, in parallel with the gh-pages publish — the
    # Worker is decoupled from the web bundle, same as Android. Requires repo
    # secrets CLOUDFLARE_API_TOKEN (scoped: Workers Scripts + Durable Objects
    # edit) and CLOUDFLARE_ACCOUNT_ID. If either is absent the job FAILS LOUDLY —
    # a silent no-op once let a pre-fix Worker ship under a green release (client
    # got the fix, Worker stayed stale, multiplayer desynced). A red job is the
    # signal that the live Worker did NOT get this release.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Cloudflare secrets missing — cannot deploy the MP Worker (leludo-mp). Set repo secrets CLOUDFLARE_API_TOKEN (scoped: Workers Scripts Edit + Account Workers Durable Objects) and CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "Cloudflare credentials present — proceeding with Worker deploy."

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  build-web:
    name: Build web
    needs: [detect-version, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: npm run build:www

      - name: Zip web bundle
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          cd www
          zip -r "../ludo-web-v${VERSION}.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: ludo-web-v*.zip
          if-no-files-found: error

  publish-pages:
    name: Publish to Cloudflare Pages
    needs: [detect-version, build-web]
    runs-on: ubuntu-latest
    # Publishes the built www/ bundle to the Cloudflare Pages project `leludo`,
    # which serves leludo.org (apex). Decoupled from the MP Worker (mp.leludo.org)
    # — switching the static host never touches multiplayer, the client dials the
    # mp. subdomain by hostname (scripts/net/net-client.js). Requires repo secrets
    # CLOUDFLARE_API_TOKEN (scoped: Cloudflare Pages Edit) + CLOUDFLARE_ACCOUNT_ID;
    # absent → FAILS LOUDLY, same rationale as deploy-worker (a silent no-op would
    # let a green release ship stale assets).
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: node tools/build-www.mjs

      - name: Check Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Cloudflare secrets missing — cannot publish the web bundle to Cloudflare Pages (project leludo). Set repo secrets CLOUDFLARE_API_TOKEN (scoped: Cloudflare Pages Edit) and CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "Cloudflare credentials present — proceeding with Pages publish."

      - name: Publish to Cloudflare Pages (leludo.org)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler logs a benign warning that the repo-root wrangler.toml (the
          # Worker config) lacks pages_build_output_dir and IGNORES it, then
          # proceeds — expected. Do NOT try to silence it with --config: Pages
          # rejects a custom config path ("Pages does not support custom paths
          # for the Wrangler configuration file") on every wrangler version.
          # --branch=main → a PRODUCTION deploy (matches the project's production
          # branch), serving the leludo.org custom domain. www/ is gitignored,
          # hence --commit-dirty=true.
          command: pages deploy www --project-name=leludo --branch=main --commit-dirty=true

  release:
    name: Publish release (Web)
    needs: [detect-version, build-web, publish-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: dist/web-dist

      - name: Create tag if missing
        env:
          TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping create."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          name: ${{ needs.detect-version.outputs.tag }}
          generate_release_notes: true
          body: |
            Full release notes: https://leludo.fun/changelog.html

            Artifacts:
            - `ludo-web-v${{ needs.detect-version.outputs.version }}.zip` — web bundle (Capacitor `www/` contents)
          files: |
            dist/web-dist/*.zip
